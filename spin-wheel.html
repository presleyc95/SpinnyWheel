<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>
<style>
  :root{
    --ink:#1b2430;
    --ink-soft:#5b6774;
    --line:#d9dee3;
    --surface:#ffffff;
    --canvas-bg:#f4f6f8;
    --accent:#0f6e5c;
    --accent-dark:#0b5346;
    --accent-soft:#e4f2ee;
    --focus:#1665c1;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    font-family:"Segoe UI", "Segoe UI Web", Tahoma, Geneva, Verdana, sans-serif;
    background:var(--canvas-bg);
    color:var(--ink);
  }
  .app{
    display:flex;
    flex-wrap:wrap;
    gap:24px;
    align-items:flex-start;
    justify-content:center;
    padding:24px;
    max-width:1000px;
    margin:0 auto;
  }
  .wheel-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    flex:1 1 380px;
    min-width:300px;
  }
  .wheel-wrap{
    position:relative;
    width:100%;
    max-width:420px;
    aspect-ratio:1/1;
  }
  canvas{
    width:100%;
    height:100%;
    display:block;
    filter:drop-shadow(0 6px 18px rgba(20,30,40,0.16));
  }
  .pointer{
    position:absolute;
    top:50%;
    right:-6px;
    transform:translateY(-50%);
    width:0;
    height:0;
    border-top:13px solid transparent;
    border-bottom:13px solid transparent;
    border-right:26px solid var(--ink);
    filter:drop-shadow(1px 0 1px rgba(0,0,0,0.25));
    z-index:5;
  }
  .hub-label{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-weight:600;
    font-size:13px;
    color:var(--ink);
    pointer-events:none;
    width:34%;
    line-height:1.25;
  }
  .spin-btn{
    appearance:none;
    border:none;
    background:var(--accent);
    color:#fff;
    font-size:16px;
    font-weight:600;
    padding:12px 34px;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.2px;
    transition:background .15s ease, transform .1s ease;
  }
  .spin-btn:hover{background:var(--accent-dark);}
  .spin-btn:active{transform:scale(0.97);}
  .spin-btn:disabled{background:#a9b3bb;cursor:not-allowed;}
  .spin-btn:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}

  .panel{
    flex:1 1 300px;
    min-width:260px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
  }
  .panel h2{
    margin:0 0 4px 0;
    font-size:15px;
    font-weight:600;
  }
  .panel p.hint{
    margin:0 0 12px 0;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  textarea{
    width:100%;
    min-height:180px;
    resize:vertical;
    font-family:"Segoe UI", Tahoma, sans-serif;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    line-height:1.6;
  }
  textarea:focus-visible{outline:2px solid var(--focus);outline-offset:1px;}
  .row{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .btn-secondary{
    appearance:none;
    background:var(--accent-soft);
    color:var(--accent-dark);
    border:1px solid transparent;
    font-size:13px;
    font-weight:600;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
  }
  .btn-secondary:hover{background:#d7ece6;}
  .btn-secondary:focus-visible{outline:2px solid var(--focus);outline-offset:1px;}
  .count{
    font-size:12px;
    color:var(--ink-soft);
    margin-left:auto;
    align-self:center;
  }
  .toggle-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:14px;
    font-size:13px;
    color:var(--ink-soft);
  }

  .result-overlay{
    position:fixed;
    inset:0;
    background:rgba(20,26,32,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
    z-index:50;
  }
  .result-overlay.show{
    opacity:1;
    pointer-events:auto;
  }
  .result-card{
    background:#fff;
    border-radius:16px;
    padding:32px 40px;
    text-align:center;
    min-width:260px;
    max-width:90vw;
    transform:translateY(10px) scale(.98);
    transition:transform .2s ease;
    box-shadow:0 20px 50px rgba(15,25,35,0.25);
  }
  .result-overlay.show .result-card{
    transform:translateY(0) scale(1);
  }
  .result-eyebrow{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:700;
    margin-bottom:8px;
  }
  .result-value{
    font-size:32px;
    font-weight:700;
    color:var(--ink);
    word-break:break-word;
  }
  .result-close{
    margin-top:22px;
    appearance:none;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    padding:9px 22px;
    border-radius:999px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .result-close:hover{background:#f2f3f5;}

  @media (prefers-reduced-motion: reduce){
    canvas{transition:none !important;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="wheel-col">
    <div class="wheel-wrap">
      <canvas id="wheel" width="600" height="600" role="img" aria-label="Spin wheel"></canvas>
      <div class="hub-label" id="hubLabel">Tap<br>Spin</div>
      <div class="pointer" aria-hidden="true"></div>
    </div>
    <button class="spin-btn" id="spinBtn">Spin the wheel</button>
  </div>

  <div class="panel">
    <h2>Entries</h2>
    <p class="hint">One entry per line. Changes update the wheel automatically.</p>
    <textarea id="entriesBox" spellcheck="false"></textarea>
    <div class="row">
      <button class="btn-secondary" id="shuffleBtn" type="button">Shuffle order</button>
      <button class="btn-secondary" id="removeWinnerBtn" type="button">Remove last winner</button>
      <span class="count" id="entryCount">3 entries</span>
    </div>
    <label class="toggle-row">
      <input type="checkbox" id="noRepeatToggle">
      Remove each winner automatically after it's picked
    </label>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-eyebrow">Result</div>
    <div class="result-value" id="resultValue">—</div>
    <button class="result-close" id="resultClose">Close</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const entriesBox = document.getElementById('entriesBox');
  const spinBtn = document.getElementById('spinBtn');
  const entryCount = document.getElementById('entryCount');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const removeWinnerBtn = document.getElementById('removeWinnerBtn');
  const noRepeatToggle = document.getElementById('noRepeatToggle');
  const resultOverlay = document.getElementById('resultOverlay');
  const resultValue = document.getElementById('resultValue');
  const resultClose = document.getElementById('resultClose');
  const hubLabel = document.getElementById('hubLabel');

  const PALETTE = ['#0f6e5c','#c96a2f','#3a5a8c','#7a4f9e','#b0473a','#2f8a6b','#c9a227','#5b6774'];

  let entries = ['Entergy','CenterPoint','QC'];
  let rotation = 0; // current rotation in radians
  let spinning = false;
  let lastWinnerIndex = null;

  function getEntries(){
    return entriesBox.value
      .split('\n')
      .map(s=>s.trim())
      .filter(s=>s.length>0);
  }

  function syncFromTextarea(){
    const list = getEntries();
    entries = list.length ? list : [];
    entryCount.textContent = entries.length + (entries.length===1?' entry':' entries');
    draw();
  }

  entriesBox.value = entries.join('\n');
  entryCount.textContent = '3 entries';

  entriesBox.addEventListener('input', syncFromTextarea);

  shuffleBtn.addEventListener('click', ()=>{
    for(let i=entries.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [entries[i],entries[j]] = [entries[j],entries[i]];
    }
    entriesBox.value = entries.join('\n');
    draw();
  });

  removeWinnerBtn.addEventListener('click', ()=>{
    if(lastWinnerIndex===null || lastWinnerIndex>=entries.length) return;
    entries.splice(lastWinnerIndex,1);
    entriesBox.value = entries.join('\n');
    lastWinnerIndex = null;
    syncFromTextarea();
  });

  function draw(){
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2;
    const r = w/2 - 6;
    ctx.clearRect(0,0,w,h);

    if(entries.length===0){
      ctx.beginPath();
      ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle = '#eef1f3';
      ctx.fill();
      ctx.fillStyle = '#8a95a0';
      ctx.font = '600 20px "Segoe UI"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Add entries to build the wheel', cx, cy);
      return;
    }

    const n = entries.length;
    const slice = (Math.PI*2)/n;

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rotation);

    for(let i=0;i<n;i++){
      const start = i*slice;
      const end = start+slice;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,r,start,end);
      ctx.closePath();
      ctx.fillStyle = PALETTE[i % PALETTE.length];
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // label
      ctx.save();
      ctx.rotate(start + slice/2);
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = getContrastColor(PALETTE[i % PALETTE.length]);
      const fontSize = Math.max(13, Math.min(26, 240/Math.max(n,3)));
      ctx.font = '700 ' + fontSize + 'px "Segoe UI"';
      let label = entries[i];
      const maxLen = 18;
      if(label.length>maxLen) label = label.slice(0,maxLen-1)+'…';
      ctx.fillText(label, r - 16, 0);
      ctx.restore();
    }

    ctx.restore();

    // hub circle
    ctx.beginPath();
    ctx.arc(cx,cy, r*0.22, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#d9dee3';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function getContrastColor(hex){
    const c = hex.substring(1);
    const rgb = parseInt(c,16);
    const r = (rgb>>16)&0xff, g=(rgb>>8)&0xff, b=rgb&0xff;
    const lum = (0.299*r+0.587*g+0.114*b)/255;
    return lum > 0.6 ? '#1b2430' : '#ffffff';
  }

  function easeOutCubic(t){ return 1 - Math.pow(1-t,3); }

  function spin(){
    if(spinning) return;
    if(entries.length===0) return;
    if(entries.length===1){
      showResult(entries[0]);
      lastWinnerIndex = 0;
      return;
    }
    spinning = true;
    spinBtn.disabled = true;
    hubLabel.style.opacity = '0';

    const n = entries.length;
    const slice = (Math.PI*2)/n;
    const winnerIndex = Math.floor(Math.random()*n);

    // Pointer is fixed at angle 0 (3 o'clock, pointing left into the wheel).
    // We want the winning slice's center to land at angle 0 after rotation.
    const winnerCenterAngle = winnerIndex*slice + slice/2;
    const targetWithinCircle = ( -winnerCenterAngle ) % (Math.PI*2);
    const extraSpins = 6 + Math.floor(Math.random()*3); // 6-8 full turns
    const startRotation = rotation;
    const currentMod = ((rotation % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    let delta = (targetWithinCircle - currentMod + Math.PI*2) % (Math.PI*2);
    const totalDelta = delta + extraSpins*Math.PI*2;

    const duration = 4200;
    const startTime = performance.now();

    function frame(now){
      const elapsed = now - startTime;
      const t = Math.min(elapsed/duration, 1);
      const eased = easeOutCubic(t);
      rotation = startRotation + totalDelta*eased;
      draw();
      if(t<1){
        requestAnimationFrame(frame);
      }else{
        spinning = false;
        spinBtn.disabled = false;
        hubLabel.style.opacity = '1';
        lastWinnerIndex = winnerIndex;
        showResult(entries[winnerIndex]);
        if(noRepeatToggle.checked){
          entries.splice(winnerIndex,1);
          entriesBox.value = entries.join('\n');
          lastWinnerIndex = null;
          entryCount.textContent = entries.length + (entries.length===1?' entry':' entries');
        }
      }
    }
    requestAnimationFrame(frame);
  }

  function showResult(value){
    resultValue.textContent = value;
    resultOverlay.classList.add('show');
  }
  function hideResult(){
    resultOverlay.classList.remove('show');
  }

  resultClose.addEventListener('click', hideResult);
  resultOverlay.addEventListener('click', (e)=>{
    if(e.target===resultOverlay) hideResult();
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key==='Escape') hideResult();
  });

  spinBtn.addEventListener('click', spin);
  canvas.addEventListener('click', spin);

  draw();
})();
</script>
</body>
</html>
